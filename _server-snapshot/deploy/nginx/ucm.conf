# GTSoftHub Nginx Config - Configuracao Limpa
# Gerado em: 2026-06-11

# Variaveis DNS para Docker
resolver 127.0.0.11 ipv6=off;
resolver_timeout 5s;

# Rate limiting zones (HTTP context only)
limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=api_webhook:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_strict:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
limit_req_status 429;
limit_conn_status 429;

# Upstreams (NAO coloca limit_req_zone aqui!)
upstream ucm_frontend {
    zone ucm_frontend 64k;
    server ucm-frontend:3000 resolve;
}

upstream ucm_backend {
    zone ucm_backend 64k;
    server ucm-backend:3001 resolve;
}

upstream ucm_frontend_test {
    zone ucm_frontend_test 64k;
    server ucm-frontend-test:3000 resolve;
}

upstream ucm_backend_test {
    zone ucm_backend_test 64k;
    server ucm-backend-test:3001 resolve;
}

# ============================================
# SERVER BLOCKS - HTTP 80 (Redirect para HTTPS)
# ============================================

server {
    listen 80;
    server_name gtsofthub.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name www.gtsofthub.com.br;
    return 301 https://gtsofthub.com.br$request_uri;
}

server {
    listen 80;
    server_name dev.gtsofthub.com.br;
    return 301 https://$host$request_uri;
}

# Fallback para IP ou outros hosts
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ============================================
# SERVER BLOCKS - HTTPS 443 (Producao)
# ============================================

server {
    listen 443 ssl http2;
    server_name gtsofthub.com.br www.gtsofthub.com.br;

    ssl_certificate /etc/letsencrypt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API endpoints
    location /api/ {
        limit_req zone=api_general burst=30 nodelay;
        proxy_pass http://ucm_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Auth endpoints (mais restrito)
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://ucm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Webhook endpoints (rate limit especifico)
    location /api/v1/payments/webhook/ {
        limit_req zone=api_webhook burst=10 nodelay;
        proxy_pass http://ucm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/whatsapp/webhook {
        limit_req zone=api_webhook burst=10 nodelay;
        proxy_pass http://ucm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health checks (sem rate limit)
    location /api/v1/health {
        proxy_pass http://ucm_backend;
        proxy_set_header Host $host;
    }

    # Websocket
    location /ws/ {
        proxy_pass http://ucm_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files / Frontend
    location / {
        proxy_pass http://ucm_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Swagger docs (restrito)
    location /api/docs {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://ucm_backend;
    }

    location /api/docs-json {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://ucm_backend;
    }
}

# ============================================
# SERVER BLOCKS - HTTPS 443 (DEV/TEST)
# ============================================

server {
    listen 443 ssl http2;
    server_name dev.gtsofthub.com.br;

    ssl_certificate /etc/letsencrypt/fullchain.pem;
