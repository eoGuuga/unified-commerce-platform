name: Deploy to Production VPS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: 'Skip frontend build'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BUILDER: ${{ github.repository_owner }}/ucm-builder
  IMAGE_NAME_BACKEND: ${{ github.repository_owner }}/ucm-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository_owner }}/ucm-frontend

jobs:
  # ============================================
  # JOB 1: Build and Push Backend Image
  # ============================================
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for OIDC authentication

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata for Backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 5m
          command_timeout: 10m
          envs: GITHUB_SHA,GHCR_TOKEN
          script: |
            set -e
            echo "🚀 Starting backend deployment..."

            # Login to GHCR with token
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker pull ${{ env.IMAGE_NAME_BACKEND }}:sha-$GITHUB_SHA

            # Stop and remove old container
            docker stop ucm-backend 2>/dev/null || true
            docker rm ucm-backend 2>/dev/null || true

            # Run new container with health check
            docker run -d \
              --name ucm-backend \
              --network deploy_ucm-net \
              --restart unless-stopped \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e REDIS_URL=${{ secrets.REDIS_URL }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e NODE_ENV=production \
              -e CORS_ORIGINS=${{ secrets.CORS_ORIGINS }} \
              -e FRONTEND_URL=${{ secrets.FRONTEND_URL }} \
              ${{ env.IMAGE_NAME_BACKEND }}:sha-$GITHUB_SHA

            # Wait and verify container is running
            echo "⏳ Waiting for container to start..."
            sleep 15

            # Check if container is running
            if ! docker ps | grep -q ucm-backend; then
              echo "❌ Container failed to start!"
              docker logs ucm-backend
              exit 1
            fi

            # Verify health
            echo "🔍 Verifying deployment..."
            docker logs ucm-backend --tail 30

            # Cleanup old images
            docker image prune -f

            echo "✅ Backend deployment complete!"

  # ============================================
  # JOB 2: Build and Push Frontend Image
  # ============================================
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_frontend != 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata for Frontend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 5m
          command_timeout: 10m
          envs: GITHUB_SHA,GHCR_TOKEN
          script: |
            set -e
            echo "🚀 Starting frontend deployment..."

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker pull ${{ env.IMAGE_NAME_FRONTEND }}:sha-$GITHUB_SHA

            # Stop and remove old container
            docker stop ucm-frontend 2>/dev/null || true
            docker rm ucm-frontend 2>/dev/null || true

            # Run new container
            docker run -d \
              --name ucm-frontend \
              --network deploy_ucm-net \
              --restart unless-stopped \
              -p 3000:3000 \
              ${{ env.IMAGE_NAME_FRONTEND }}:sha-$GITHUB_SHA

            # Wait for container
            sleep 10

            # Verify
            if ! docker ps | grep -q ucm-frontend; then
              echo "❌ Container failed to start!"
              docker logs ucm-frontend
              exit 1
            fi

            docker logs ucm-frontend --tail 10

            echo "✅ Frontend deployment complete!"

  # ============================================
  # JOB 3: Restart Nginx
  # ============================================
  restart-nginx:
    name: Restart Nginx
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Restart Nginx
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 2m
          script: |
            set -e
            echo "🔄 Restarting nginx..."

            docker restart ucm-nginx

            sleep 5

            # Verify nginx is running
            if ! docker ps | grep -q ucm-nginx; then
              echo "❌ Nginx failed to start!"
              docker logs ucm-nginx
              exit 1
            fi

            echo "✅ Nginx restarted!"

  # ============================================
  # JOB 4: Verify Deployment
  # ============================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, restart-nginx]
    if: always()

    steps:
      - name: Verify Health Endpoint
        run: |
          echo "🔍 Verifying deployment on VPS..."
          echo "Attempting to reach health endpoint..."

          # Retry logic for health check
          MAX_ATTEMPTS=5
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."

            RESPONSE=$(curl -s -k -w "\n%{http_code}" https://${{ secrets.VPS_HOST }}/api/v1/health || echo "000")

            if echo "$RESPONSE" | grep -q "200"; then
              echo "✅ Health check passed!"
              echo "$RESPONSE" | head -1
              exit 0
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "⏳ Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

          echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
          echo "Response: $RESPONSE"
          exit 1

      - name: Deployment Summary
        if: success()
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Message:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend: Running" >> $GITHUB_STEP_SUMMARY
          echo "✅ Nginx: Running" >> $GITHUB_STEP_SUMMARY
          echo "✅ Health Check: Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**VPS:** ${{ secrets.VPS_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://${{ secrets.VPS_HOST }}/api/v1/health" >> $GITHUB_STEP_SUMMARY