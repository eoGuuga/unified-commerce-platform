name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancela runs antigos no mesmo branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ucm_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ucm_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ucm_ci
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-jwt-secret-with-32-or-more-chars
      ENCRYPTION_KEY: ci-only-encryption-key-with-32-or-more-chars
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Unit tests
        working-directory: backend
        run: npm run test:unit
        # TODO: remover continue-on-error quando 4 testes NLP do whatsapp forem corrigidos:
        #   product-offer-intelligence.service.spec.ts (self-treat boost)
        #   conversational-intelligence.service.spec.ts (payment trust topic)
        #   conversation-planner.service.spec.ts (reassurance mode x2)
        continue-on-error: true

      - name: Integration tests
        working-directory: backend
        run: npm run test:integration
        continue-on-error: true # remover quando todas as integracoes estiverem estaveis no CI

      - name: Audit (high+)
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Unit tests (Vitest)
        working-directory: frontend
        run: npm test -- --reporter=default

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: /api/v1
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build

      - name: Audit (high+)
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true
