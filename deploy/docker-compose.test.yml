version: '3.8'

# ============================================
# Ambiente DEV/TESTE completo (VPS)
# ============================================
#
# Objetivo: subir stack completo (backend + frontend + DB + Redis)
# para o dominio dev (https://dev.gtsofthub.com.br).
#
# Observacao:
# - Use project name "ucmtest" (scripts assumem isso).
# - Nao expõe portas publicas; o Nginx de producao roteia para este stack.
#
# Uso:
#   docker compose --env-file ./deploy/.env -f ./deploy/docker-compose.test.yml --project-name ucmtest up -d --build
#

services:
  postgres:
    image: postgres:15-alpine
    container_name: ucm-postgres-test
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ucm
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ucm"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ucm-test-net

  redis:
    image: redis:7-alpine
    container_name: ucm-redis-test
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - ucm-test-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ucm-backend-test
    restart: unless-stopped
    init: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    env_file:
      - ./.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ucm-test-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ucm-frontend-test
    restart: unless-stopped
    init: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    env_file:
      - ./.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_APP_URL: ${FRONTEND_URL}
    depends_on:
      - backend
    networks:
      - ucm-test-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ucm-nginx-test
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./nginx/ucm.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ucm-test-net

volumes:
  postgres_test_data:
  redis_test_data:

networks:
  ucm-test-net:
    driver: bridge
