services:
  postgres:
    image: postgres:15-alpine
    container_name: ucm-postgres
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 1.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ucm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ucm"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ucm-net

  redis:
    image: redis:7-alpine
    container_name: ucm-redis
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - ucm-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ucm-backend
    restart: unless-stopped
    init: true
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 1.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      # F18: passthrough para MIGRATIONS (DDL como superuser). O app runtime usa
      # DATABASE_URL (ucm_app sob RLS, sem DDL); a data-source de migration prefere
      # DATABASE_ADMIN_URL. Sem isto, `docker compose run backend migration:run`
      # herdava so DATABASE_URL e a migration falhava no DDL. Inerte pro app (que
      # nao le esta var); ativa no proximo deploy. Exige DATABASE_ADMIN_URL no .env.
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:-}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      WHATSAPP_DEFAULT_SHIPPING_AMOUNT: ${WHATSAPP_DEFAULT_SHIPPING_AMOUNT:-10}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-8000}
      WHATSAPP_LLM_ASSIST_ENABLED: ${WHATSAPP_LLM_ASSIST_ENABLED:-false}
      WHATSAPP_LLM_ASSIST_TIMEOUT_MS: ${WHATSAPP_LLM_ASSIST_TIMEOUT_MS:-5000}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-evolution}
      # WhatsApp Cloud API (Meta) — credenciais do bot. Fail-closed sem elas.
      WHATSAPP_CLOUD_PHONE_NUMBER_ID: ${WHATSAPP_CLOUD_PHONE_NUMBER_ID:-}
      WHATSAPP_CLOUD_ACCESS_TOKEN: ${WHATSAPP_CLOUD_ACCESS_TOKEN:-}
      WHATSAPP_CLOUD_API_VERSION: ${WHATSAPP_CLOUD_API_VERSION:-v21.0}
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_CONVERSATION_TTL_HOURS: ${WHATSAPP_CONVERSATION_TTL_HOURS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Pagamento (sem isto o backend cai em modo 'mock' e nao cobra de verdade).
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_WEBHOOK_TOKEN: ${MERCADOPAGO_WEBHOOK_TOKEN:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
      PIX_KEY: ${PIX_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ucm-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID}
    container_name: ucm-frontend
    restart: unless-stopped
    init: true
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_APP_URL: ${FRONTEND_URL}
    depends_on:
      - backend
    networks:
      - ucm-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ucm-nginx
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ucm.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ucm-net
      - ucmtest-net

volumes:
  postgres_data:
  redis_data:

networks:
  ucm-net:
    driver: bridge
  ucmtest-net:
    external: true
    name: ucmtest_ucm-test-net

